<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gia Nhập Cộng Đồng NextGen Sports</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">NextGen<span>Sports</span></div>
            <nav><ul>
                <li><a href="index.html">Trang Chủ</a></li>
                <li><a href="bong-da.html">Bóng Đá Việt</a></li>
                <li><a href="tennis.html">Quần Vợt</a></li>
                <li><a href="dang-ky.html" class="active">Gia Nhập</a></li>
                <li><a href="site-map.html">Sơ Đồ</a></li>
            </ul></nav>
        </div>
    </header>

    <main class="container">
        <!-- Khung Đăng Ký Chuẩn Bố Cục -->
        <div class="auth-box">
            <h2 class="auth-title">Tạo Tài Khoản Mới</h2>
            <form id="form-join">
                <!-- Group nhóm lại để không bao giờ bị lệch layout -->
                <div class="form-group">
                    <label for="username">Tên hiển thị</label>
                    <input type="text" id="username" class="input-field" required placeholder="Ví dụ: duy_cybersec">
                </div>
                
                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" class="input-field" required placeholder="name@domain.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Mật mã bảo mật</label>
                    <input type="password" id="password" class="input-field" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-block">Kích Hoạt Tài Khoản</button>
            </form>
        </div>
    </main>

    <footer><p>&copy; 2026 tinthethao.com.vn</p></footer>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
